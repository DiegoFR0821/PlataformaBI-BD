<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plataforma_Inseguridad_Ciudadana - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <i class="fa-solid fa-shield-halved fa-3x" style="color: var(--cyan); margin-bottom: 15px;"></i>
            <h2 style="margin-bottom: 5px;">Plataforma BI Integrada - Inseguridad Ciudadana</h2>
            <p class="font-mono" style="color: var(--text-secondary); font-size: 12px; margin-bottom: 30px;">Vigilance System | Lima Norte</p>
            
            <form id="login-form">
                <input type="email" class="login-input" placeholder="Usuario Institucional" required>
                <input type="password" class="login-input" placeholder="Contraseña de acceso" required>
                <button type="submit" class="btn-primary">AUTENTICAR <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
